<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bpmf+Iansui&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <title>Strutures Inc</title>
</head>
<body class="page">
<header class="header">
</header>
<main class="main">
    <section class="services-grid services-grid--checker">

        <button class="tile tile--tl">
            <img class="tile__img" src="images/leveling.jpg" alt="">
            <span class="tile__label">Structural Leveling & Repairs</span>
        </button>

        <button class="tile tile--tr">
            <img class="tile__img" src="images/waterproofing.jpg" alt="">
            <span class="tile__label">Deck Waterproofing</span>
        </button>

        <button class="tile tile--bl">
            <img class="tile__img" src="images/bath.jpg" alt="">
            <span class="tile__label">Kitchen & Baths</span>
        </button>

        <button class="tile tile--br">
            <img class="tile__img" src="images/roof.jpg" alt="">
            <span class="tile__label">Metal / Flat Roof Coatings</span>
        </button>

        <div class="logo-card">
            <img class="logo-card__img" src="images/Bpmf.png" alt="Structures Inc Logo">
            <p class="logo-card__tagline">When you need to think outside the box.</p>
        </div>

    </section>
</main>
</body>
</html>
